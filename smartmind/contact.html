<body>
    <header>
        <a href="index.html" class="logo">
            <img src="images/smartmindlogo.png" alt="SmartMind - Intelligent Solutions Logo" width="80" height="80">
        </a>
        <button id="menu-button" class="hamburger" aria-label="Open navigation menu"></button>

            <ul id="nav-menu">
                <li><a href="index.html" class="active">Home</a></li>

            </ul>
        </nav>
    </header>

    <main>
        <section class="page-title">
            <h2>Contact Us</h2>
            <p>We would love to hear from you. Fill out the form below to get started.</p>
        </section>

        <section class="contact-form-section">
            <form action="thank-you.html" method="get">
                <fieldset>
                    <legend>Your Information</legend>
                    <label for="fullName">Full Name*</label>
                    <input type="text" id="fullName" name="fullName" required>

                    <label for="email">Email*</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">

                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="123-456-7890">
                </fieldset>

                <fieldset>
                    <legend>Your Message</legend>
                    <label for="interest">I'm interested in...</label>
                    <select id="interest" name="interest">
                        <option value="" disabled selected>Select a Modality</option>
                        <option value="bjj">ChatGPT</option>
                        <option value="boxing">n8n</option>
                        <option value="muaythai">Gemini</option>
                        <option value="mma">Claude</option>
                        <option value="mmafit">Copilot</option>
                        <option value="general">General Inquiry</option>
                    </select>

                    <label for="message">Message*</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </fieldset>

                <button type="submit" class="cta-button">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
